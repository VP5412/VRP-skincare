<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .face-mesh-glow {
      background-image: radial-gradient(circle at center, rgba(190, 230, 211, 0.15) 0%, transparent 70%);
    }
    .scanner-line {
      background: linear-gradient(180deg, transparent 0%, #bee6d3 50%, transparent 100%);
      height: 2px;
      width: 100%;
      position: absolute;
      top: 0;
      animation: scan 3s ease-in-out infinite;
    }
    @keyframes scan {
      0%, 100% { top: 15%; opacity: 0; }
      20%, 80% { opacity: 1; }
      50% { top: 85%; }
    }
    .tracking-dot {
      width: 4px;
      height: 4px;
      background-color: #bee6d3;
      border-radius: 50%;
      box-shadow: 0 0 8px #bee6d3;
      position: absolute;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface font-body min-h-screen overflow-hidden">
<!-- Top Navigation Shell - High-Tech Overlay Style -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-transparent">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">close</span>

<div class="flex flex-col items-center">

</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md text-white hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined">flash_on</span>
</button>
</header>

<div class="absolute inset-0 z-10 pointer-events-none">

<div class="absolute inset-0 border-[32px] border-black/20 backdrop-blur-[1px]"></div>
<!-- Central Scanning Frame -->
<div class="absolute inset-x-12 top-1/2 -translate-y-1/2 aspect-[3/4] border border-white/20 rounded-[3rem] overflow-hidden">
<!-- Glow Aura -->
<div class="absolute inset-0 face-mesh-glow"></div>
<!-- Animated Scanner Line -->
<div class="scanner-line"></div>
<!-- High-Tech Corners -->
<div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-primary-container rounded-tl-lg"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-primary-container rounded-tr-lg"></div>
<div class="absolute bottom-8 left-8 w-8 h-8 border-b-2 border-l-2 border-primary-container rounded-bl-lg"></div>
<div class="absolute bottom-8 right-8 w-8 h-8 border-b-2 border-r-2 border-primary-container rounded-br-lg"></div>
<!-- Tracking Dots Matrix -->
<div class="tracking-dot" style="top: 30%; left: 45%;"></div>
<div class="tracking-dot" style="top: 32%; left: 55%;"></div>
<div class="tracking-dot" style="top: 45%; left: 35%;"></div>
<div class="tracking-dot" style="top: 45%; left: 65%;"></div>

</div>
</div>
<!-- Bottom Controls -->

</div>

<div class="absolute inset-0 bg-primary-container blur-xl opacity-20 group-active:opacity-40 transition-opacity"></div>
<div class="relative w-20 h-20 rounded-full border-4 border-white flex items-center justify-center">
<div class="w-16 h-16 rounded-full bg-white scale-90 group-active:scale-100 transition-transform flex items-center justify-center">

</div>
